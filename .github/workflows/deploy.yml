name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_WARUNG_ZAVI_API_URL: ${{ secrets.VITE_WARUNG_ZAVI_API_URL }}
          VITE_WARUNG_ZAVI_ADMIN_USERNAME: ${{ secrets.VITE_WARUNG_ZAVI_ADMIN_USERNAME }}
          VITE_WARUNG_ZAVI_ADMIN_PASSWORD: ${{ secrets.VITE_WARUNG_ZAVI_ADMIN_PASSWORD }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
